async function api(action, data={}, token=null) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, token, ...data }),
    });
    return await res.json();
  } catch(e) {
    return { ok: false, error: "Errore di connessione. Controlla la tua rete." };
  }
}

// Token salvato in localStorage
function getToken()  { try { return localStorage.getItem("asppi_token"); } catch(e) { return null; } }
function saveToken(t){ try { localStorage.setItem("asppi_token", t); } catch(e) {} }
function clearToken(){ try { localStorage.removeItem("asppi_token"); localStorage.removeItem("asppi_user"); } catch(e) {} }
function getUser()   { try { return JSON.parse(localStorage.getItem("asppi_user")||"null"); } catch(e) { return null; } }
function saveUser(u) { try { localStorage.setItem("asppi_user", JSON.stringify(u)); } catch(e) {} }

          </div>
          {day&&<>

        {step===6&&<Box title="7 — GARANTI (OPZIONALI)">

          :<>{gars.map((_,i)=><Persona key={i} tipo="GARANTE" n={i+1} onRemove={()=>setGars(a=>a.filter((_,j)=>j!==i))}/>)}
          <button onClick={()=>setGars(a=>[...a,a.length+1])} style={{width:"100%",padding:"10px 0",borderRadius:10,border:`2px dashed ${bd}`,backgroundColor:"transparent",color:st,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:8}}>＋ Aggiungi altro garante</button></>}
        </Box>}
        {step===7&&<Box title="8 — NOTE AGGIUNTIVE"><Info blue>Clausole particolari o richieste. Il modello ministeriale non può essere stravolto.</Info>
          <label style={lbl}>Note</label><textarea placeholder="Es. L'immobile è dotato di box auto..." style={{...inp,minHeight:120,resize:"vertical",lineHeight:1.6}}/></Box>}
        {step===8&&<>
          <Box title="9 — CONSENSO DATI (GDPR)">
            <div style={{fontSize:12,color:st,lineHeight:1.7,marginBottom:14}}>Titolare del trattamento: <strong>PRO DOMO SUA – ASPPI L'Aquila</strong>, C.so Vittorio Emanuele 9, L'Aquila.</div>

              <div key={i} onClick={()=>setGdpr(g=>g.map((v,j)=>j===i?!v:v))} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12,cursor:"pointer"}}>

                </div>
                <div style={{fontSize:13,color:"#4A4A4A",lineHeight:1.5}}>{t}</div>
              </div>
            ))}
          </Box>
          <Box title="RIEPILOGO">
            {[["Tipo",tipo||"—"],["Locatori",locs.length],["Conduttori",cons.length],["Garanti",gars.length||"Nessuno"]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${bd}`}}>
                <span style={{fontSize:12,color:st}}>{l}</span><span style={{fontSize:13,fontWeight:700,color:dk}}>{v}</span>
              </div>
            ))}
          </Box>
          <button disabled={!gdpr.every(Boolean)} onClick={()=>setSent(true)} style={{...btnP,opacity:gdpr.every(Boolean)?1:0.4}}>Invia richiesta contratto ✓</button>
          {!gdpr.every(Boolean)&&<div style={{fontSize:11,color:st,textAlign:"center",marginTop:8}}>Tutti e 4 i consensi sono obbligatori.</div>}
        </>}
      </div>
      {step<CSTEPS.length-1&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:430,backgroundColor:wh,borderTop:`1px solid ${bd}`,padding:"12px 16px 20px"}}>
          <button disabled={!canNext} onClick={()=>setStep(s=>s+1)} style={{...btnP,opacity:canNext?1:0.4}}>
            {!tipo&&step===0?"Seleziona un tipo per continuare":`Avanti: ${CSTEPS[step+1]} →`}
          </button>
        </div>
      )}
    </div>
  );
}

                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:dk}}>{c.label}</div><div style={{fontSize:11,color:st}}>dal {c.dal} al {c.al}</div></div>

            ))}
            {addC&&(
              <div style={{marginTop:12,padding:14,backgroundColor:bg,borderRadius:12}}>
                <input placeholder='Descrizione es. "Ferie agosto"' value={nc.label} onChange={e=>setNc(n=>({...n,label:e.target.value}))} style={{...inp,marginBottom:8}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                  <div><div style={{fontSize:10,color:st,marginBottom:4}}>DAL</div><input placeholder="gg/mm/aaaa" value={nc.dal} onChange={e=>setNc(n=>({...n,dal:e.target.value}))} style={inp}/></div>
                  <div><div style={{fontSize:10,color:st,marginBottom:4}}>AL</div><input placeholder="gg/mm/aaaa" value={nc.al} onChange={e=>setNc(n=>({...n,al:e.target.value}))} style={inp}/></div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setAddC(false)} style={{flex:1,padding:"9px 0",borderRadius:10,border:`1px solid ${bd}`,backgroundColor:wh,cursor:"pointer",fontSize:13}}>Annulla</button>
                  <button onClick={()=>{setChiusure(c=>[...c,{id:Date.now(),...nc}]);setNc({label:"",dal:"",al:""});setAddC(false);}} style={{flex:2,padding:"9px 0",borderRadius:10,border:"none",backgroundColor:or,color:wh,fontWeight:700,cursor:"pointer",fontSize:13}}>Conferma</button>
                </div>
              </div>
            )}
          </Box>
          <Box title="GIORNI SINGOLI BLOCCATI">
            <div style={{fontSize:11,color:st,marginBottom:10}}>Blocca un giorno singolo (es. convegno, visita medica...)</div>
            {bloccati.map((g,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${bd}`}}>
                <span>🚫</span><div style={{flex:1,fontSize:13,fontWeight:600,color:dk}}>{g}</div>
                <button onClick={()=>setBloccati(b=>b.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:rd,fontSize:18}}>✕</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <input placeholder="gg/mm/aaaa" value={ng} onChange={e=>setNg(e.target.value)} style={{...inp,flex:1,marginBottom:0}}/>
              <button onClick={()=>{if(ng){setBloccati(b=>[...b,ng]);setNg("");}}} style={{padding:"0 16px",borderRadius:10,border:"none",backgroundColor:or,color:wh,fontWeight:700,cursor:"pointer",fontSize:13,flexShrink:0}}>＋</button>
            </div>
          </Box>
          <div style={{backgroundColor:ol,borderRadius:12,padding:12,marginBottom:14,fontSize:12,color:"#4A4A4A"}}>
            ⚡️ Le prenotazioni già confermate non vengono cancellate automaticamente.
          </div>
          <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={btnP}>{saved?"✓ Salvato!":"Salva tutte le impostazioni"}</button>
        </div>
        <Nav/>
      </div>
    );
  }

  return null;
}

// ── SCHERMATA RECUPERO PASSWORD ──────────────────────────────
function ForgotPassword({onBack}){
  const [step,setStep]=useState(1);
  const [email,setEmail]=useState("");
  const [codice,setCodice]=useState("");
  const [newPwd,setNewPwd]=useState("");
  const [newPwd2,setNewPwd2]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [codiceSent,setCodiceSent]=useState("");

  const inviaEmail = async () => {
    if(!email){ setError("Inserisci la tua email"); return; }
    setLoading(true); setError("");
    const res = await api("requestPasswordReset", {email});
    setLoading(false);
    if(res.ok){
      setCodiceSent(res.codice||"");
      setStep(2);
    } else {
      setError(res.error||"Email non trovata nel sistema");
    }
  };

  const verificaCodice = () => {
    if(!codice){ setError("Inserisci il codice ricevuto"); return; }
    if(codice !== codiceSent){ setError("Codice non corretto. Controlla la email."); return; }
    setError("");
    setStep(3);
  };

  const cambiaPassword = async () => {
    if(!newPwd||newPwd.length<8){ setError("La password deve essere di almeno 8 caratteri"); return; }
    if(newPwd!==newPwd2){ setError("Le due password non coincidono"); return; }
    setLoading(true); setError("");
    const res = await api("resetPassword", {email, codice, newPassword: newPwd});
    setLoading(false);
    if(res.ok){
      setStep(4);
    } else {
      setError(res.error||"Errore. Riprova.");
    }
  };

  return(
    <div style={{fontFamily:"sans-serif",maxWidth:430,margin:"0 auto",backgroundColor:wh,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{backgroundColor:dk,padding:"48px 32px 36px"}}>
        <div style={{color:or,fontSize:11,fontWeight:700,letterSpacing:"0.12em",marginBottom:8}}>ASPPI L'AQUILA</div>
        <div style={{color:wh,fontSize:22,fontWeight:800}}>Recupero password</div>
      </div>
      <div style={{padding:"32px 24px",flex:1}}>

        {/* Step 1 - Inserisci email */}
        {step===1&&<>
          <div style={{backgroundColor:ol,borderRadius:12,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#4A4A4A",lineHeight:1.6}}>
            📧 Inserisci la tua email. Ti invieremo un codice per reimpostare la password.
          </div>
          <label style={lbl}>La tua email</label>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="mario.rossi@email.com" style={inp}/>
          {error&&<div style={{backgroundColor:rl,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:rd}}>{error}</div>}
          <button onClick={inviaEmail} disabled={loading} style={{...btnP,opacity:loading?0.6:1}}>
            {loading?"Invio in corso...":"Invia codice via email"}
          </button>
          <button onClick={onBack} style={btnS}>← Torna al login</button>
        </>}

        {/* Step 2 - Inserisci codice */}
        {step===2&&<>
          <div style={{backgroundColor:gl,borderRadius:12,padding:"12px 16px",marginBottom:20,fontSize:12,color:gn,lineHeight:1.6}}>
            ✅ Abbiamo inviato un codice a <strong>{email}</strong>. Controlla la casella email (anche spam).
          </div>
          <label style={lbl}>Codice di verifica (6 cifre)</label>
          <input value={codice} onChange={e=>setCodice(e.target.value)} placeholder="es. 123456" maxLength={6}
            style={{...inp,fontSize:24,letterSpacing:"0.3em",textAlign:"center",fontFamily:"monospace"}}/>
          {error&&<div style={{backgroundColor:rl,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:rd}}>{error}</div>}
          <button onClick={verificaCodice} style={btnP}>Verifica codice</button>
          <button onClick={()=>{setStep(1);setError("");}} style={btnS}>← Cambia email</button>
        </>}

        {/* Step 3 - Nuova password */}
        {step===3&&<>
          <div style={{backgroundColor:ol,borderRadius:12,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#4A4A4A",lineHeight:1.6}}>
            🔑 Codice verificato! Ora scegli una nuova password.
          </div>
          <label style={lbl}>Nuova password (min. 8 caratteri)</label>
          <input value={newPwd} onChange={e=>setNewPwd(e.target.value)} type="password" placeholder="••••••••" style={inp}/>
          <label style={lbl}>Conferma nuova password</label>
          <input value={newPwd2} onChange={e=>setNewPwd2(e.target.value)} type="password" placeholder="••••••••" style={inp}/>
          {error&&<div style={{backgroundColor:rl,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:rd}}>{error}</div>}
          <button onClick={cambiaPassword} disabled={loading} style={{...btnP,opacity:loading?0.6:1}}>
            {loading?"Salvataggio...":"Salva nuova password"}
          </button>
        </>}

        {/* Step 4 - Successo */}
        {step===4&&<div style={{textAlign:"center",paddingTop:40}}>
          <div style={{fontSize:56,marginBottom:16}}>✅</div>
          <div style={{fontSize:20,fontWeight:800,color:dk,marginBottom:8}}>Password aggiornata!</div>
          <div style={{fontSize:13,color:st,marginBottom:24}}>Ora puoi accedere con la nuova password.</div>
          <button onClick={onBack} style={{...btnP,width:200,borderRadius:12}}>Vai al login</button>
        </div>}

      </div>
    </div>
  );
}

// ── SCHERMATA CAMBIO PASSWORD (SOCI) ─────────────────────────
function CambioPassword({onBack}){
  const [vecchia,setVecchia]=useState("");
  const [nuova,setNuova]=useState("");
  const [nuova2,setNuova2]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [ok,setOk]=useState(false);

  const salva = async () => {
    if(!vecchia||!nuova||!nuova2){ setError("Tutti i campi sono obbligatori"); return; }
    if(nuova.length<8){ setError("La nuova password deve essere di almeno 8 caratteri"); return; }
    if(nuova!==nuova2){ setError("Le due password non coincidono"); return; }
    setLoading(true); setError("");
    const res = await api("changePassword", {oldPassword:vecchia, newPassword:nuova}, getToken());
    setLoading(false);
    if(res.ok){
      // Aggiorna remember se attivo
      try {
        const saved=JSON.parse(localStorage.getItem("asppi_remember")||"null");
        if(saved){ saved.password=nuova; localStorage.setItem("asppi_remember",JSON.stringify(saved)); }
      } catch(e){}
      setOk(true);
    } else {
      setError(res.error||"Password attuale non corretta");
    }
  };

  if(ok) return(
    <div style={{fontFamily:"sans-serif",maxWidth:430,margin:"0 auto",backgroundColor:bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:32}}>
      <div style={{fontSize:56,marginBottom:16}}>✅</div>
      <div style={{fontSize:20,fontWeight:800,color:dk,marginBottom:8}}>Password aggiornata!</div>
      <div style={{fontSize:13,color:st,marginBottom:24}}>La tua nuova password è attiva.</div>
      <button onClick={onBack} style={{...btnP,width:200,borderRadius:12}}>Torna al profilo</button>
    </div>
  );

  return(
    <div style={{fontFamily:"sans-serif",maxWidth:430,margin:"0 auto",backgroundColor:bg,minHeight:"100vh"}}>
      <div style={{backgroundColor:dk,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{color:or,fontSize:10,fontWeight:700,letterSpacing:"0.1em"}}>ASPPI L'AQUILA</div>
        <div style={{color:wh,fontSize:15,fontWeight:700}}>Cambia password</div></div>
        <button onClick={onBack} style={{background:"none",border:"1px solid #fff4",color:wh,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>← Indietro</button>
      </div>
      <div style={{padding:"24px 20px"}}>
        <div style={card}>
          <div style={sec}>MODIFICA PASSWORD</div>
          <label style={lbl}>Password attuale</label>
          <input value={vecchia} onChange={e=>setVecchia(e.target.value)} type="password" placeholder="••••••••" style={inp}/>
          <label style={lbl}>Nuova password (min. 8 caratteri)</label>
          <input value={nuova} onChange={e=>setNuova(e.target.value)} type="password" placeholder="••••••••" style={inp}/>
          <label style={lbl}>Conferma nuova password</label>
          <input value={nuova2} onChange={e=>setNuova2(e.target.value)} type="password" placeholder="••••••••" style={inp}/>
          {error&&<div style={{backgroundColor:rl,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:rd}}>{error}</div>}
          <button onClick={salva} disabled={loading} style={{...btnP,opacity:loading?0.6:1}}>
            {loading?"Salvataggio...":"Salva nuova password"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SCHERMATA LOGIN/REGISTRAZIONE ────────────────────────────
function AuthScreen({onLogin,onForgot}){
  const [tab,setTab]=useState("login");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [nome,setNome]=useState("");
  const [cognome,setCognome]=useState("");
  const [tel,setTel]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  const [ricorda,setRicorda]=useState(true);

  // Pre-compila se salvato
  useState(()=>{
    try {
      const saved = JSON.parse(localStorage.getItem("asppi_remember")||"null");
      if(saved) { setEmail(saved.email||""); setPassword(saved.password||""); setRicorda(true); }
    } catch(e){}
  });

  const submit = async () => {
    if(!email||!password) { setError("Email e password obbligatorie"); return; }
    if(tab==="register"&&!nome) { setError("Il nome è obbligatorio"); return; }
    setLoading(true); setError("");
    const res = await api(tab==="login"?"login":"register", {email,password,nome,cognome,telefono:tel});
    setLoading(false);
    if(res.ok) {
      saveToken(res.token);
      saveUser({nome:res.nome, email:res.email, userId:res.userId});
      if(ricorda) {
        localStorage.setItem("asppi_remember", JSON.stringify({email,password}));
      } else {
        localStorage.removeItem("asppi_remember");
      }
      onLogin(res);
    } else {
      setError(res.error||"Errore. Riprova.");
    }
  };

  return(
    <div style={{fontFamily:"sans-serif",maxWidth:430,margin:"0 auto",backgroundColor:wh,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{backgroundColor:dk,padding:"48px 32px 36px"}}>
        <div style={{color:or,fontSize:11,fontWeight:700,letterSpacing:"0.12em",marginBottom:8}}>ASPPI L'AQUILA</div>
        <div style={{color:wh,fontSize:26,fontWeight:800,lineHeight:1.1}}>Portale Soci</div>
        <div style={{color:"#A0A0A0",fontSize:13,marginTop:6}}>Corso Vittorio Emanuele 9 · L'Aquila</div>
      </div>
      <div style={{padding:"32px 24px",flex:1}}>
        <div style={{display:"flex",backgroundColor:bg,borderRadius:10,padding:4,marginBottom:24}}>
          {[["login","Accedi"],["register","Registrati"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setTab(v);setError("");}} style={{flex:1,padding:"9px 0",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",backgroundColor:tab===v?wh:"transparent",color:tab===v?dk:st,boxShadow:tab===v?"0 1px 4px rgba(0,0,0,0.10)":"none"}}>{l}</button>
          ))}
        </div>
        {tab==="register"&&<>
          <label style={lbl}>Nome *</label>
          <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario" style={inp}/>
          <label style={lbl}>Cognome</label>
          <input value={cognome} onChange={e=>setCognome(e.target.value)} placeholder="Rossi" style={inp}/>
          <label style={lbl}>Telefono</label>
          <input value={tel} onChange={e=>setTel(e.target.value)} placeholder="+39 333 000 0000" style={inp}/>
        </>}
        <label style={lbl}>Email *</label>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="mario.rossi@email.com" style={inp}/>
        <label style={lbl}>Password *</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••" style={inp}/>
        {error&&<div style={{backgroundColor:rl,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:rd}}>{error}</div>}
        <div onClick={()=>setRicorda(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,cursor:"pointer"}}>
          <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${ricorda?or:bd}`,backgroundColor:ricorda?or:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {ricorda&&<span style={{color:wh,fontSize:11,fontWeight:700}}>✓</span>}
          </div>
          <span style={{fontSize:13,color:dk}}>Ricorda email e password</span>
        </div>
        <button onClick={submit} disabled={loading} style={{...btnP,opacity:loading?0.6:1}}>
          {loading?"Attendere...":tab==="login"?"Accedi":"Crea account"}
        </button>
        {tab==="login"&&<button onClick={()=>onForgot()} style={{width:"100%",background:"none",border:"none",color:or,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:12,padding:"8px 0"}}>
          Password dimenticata?
        </button>}
        <div style={{fontSize:11,color:st,textAlign:"center",marginTop:12,lineHeight:1.6}}>
          Accesso riservato ai soci ASPPI L'Aquila.<br/>
          Per assistenza: <span style={{color:or}}>+39 392 519 1490</span>
        </div>
      </div>
    </div>
  );
}

  useState(()=>{

  if(mode==="choose") return(

      <button onClick={()=>setMode("auth")} style={{...btnP,marginBottom:12,borderRadius:14,maxWidth:260}}>📱 Accesso Soci</button>

        <strong style={{color:"#4A4A4A"}}>Demo</strong> = prototipo con dati finti
      </div>
    </div>
  );
  if(mode==="auth") return <AuthScreen onLogin={u=>{setUser(u);setMode("client");}} onForgot={()=>setMode("forgot")}/>;
  if(mode==="forgot") return <ForgotPassword onBack={()=>setMode("auth")}/>;

  if(mode==="cambioPwd") return <CambioPassword onBack={()=>setMode("client")}/>;
  if(mode==="admin") return <AdminApp onExit={()=>setMode("choose")}/>;
}
